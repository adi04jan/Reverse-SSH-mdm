# Apache: serve the portal under a SUBPATH, alongside Nextcloud and your other
# /var/www sites.
#
# NETWORK NOTE: your router forwards external :1010 -> the VPS's internal :80,
# so Apache listens on port 80. This block goes in the <VirtualHost *:80> vhost,
# NOT a *:1010 one. You still browse it from outside as :1010.
#
# IMPORTANT: Apache does NOT allow inline "# comments" after a directive's
# value (unlike nginx). Keep comments on their own lines.
#
# 1) Enable the proxy modules (once):
#       sudo a2enmod proxy proxy_http headers
#       sudo systemctl restart apache2
#
# 2) Paste the block below INSIDE the existing <VirtualHost *:80> ... that
#    already serves /nextcloud. Put it ABOVE any broad Alias/DocumentRoot rules.
#
# 3) Apply:
#       sudo apachectl configtest && sudo systemctl reload apache2
#
# 4) Browse: http://182.70.254.11:1010/reverse-ssh/   (router maps :1010 -> :80)
#
# The trailing slash on the proxy target strips the /reverse-ssh prefix before
# forwarding; the app re-adds it to links via root_path (PORTAL_BASE_PATH).
# Replace 8011 if you set a different APP_PORT.

ProxyPreserveHost On

# Use the request's Host header (which carries :1010 from the browser) when
# building self-referential URLs, so redirects keep the :1010 port.
UseCanonicalName Off

# Redirect the bare /reverse-ssh (no trailing slash) to /reverse-ssh/.
RedirectMatch 301 ^/reverse-ssh$ /reverse-ssh/

ProxyPass        /reverse-ssh/ http://127.0.0.1:8011/
ProxyPassReverse /reverse-ssh/ http://127.0.0.1:8011/
RequestHeader set X-Forwarded-Proto "http"
RequestHeader set X-Forwarded-Prefix "/reverse-ssh"
