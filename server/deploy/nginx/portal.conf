# nginx reverse proxy + TLS for the portal.
# 1) Replace portal.example.com with your domain (or use the VPS IP for a self-signed cert).
# 2) Obtain a cert:  certbot --nginx -d portal.example.com
# 3) Reload nginx.

server {
    listen 80;
    server_name portal.example.com;
    # Allow ACME challenges, redirect everything else to HTTPS.
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name portal.example.com;

    ssl_certificate     /etc/letsencrypt/live/portal.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.example.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
