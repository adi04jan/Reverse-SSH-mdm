# Nginx: serve the portal under a SUBPATH on your existing :1010 server,
# alongside Nextcloud and your other /var/www sites.
#
# Add this `location` block INSIDE the existing `server { listen 1010; ... }`
# block that already serves /nextcloud, then reload nginx.
#
# The trailing slash on proxy_pass strips the /reverse-ssh prefix before
# forwarding; the app re-adds it to links via its root_path (PORTAL_BASE_PATH).

location /reverse-ssh/ {
    proxy_pass http://127.0.0.1:8011/;     # APP_PORT from setup_vps.sh
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /reverse-ssh;
}

# Redirect the bare /reverse-ssh (no trailing slash) to /reverse-ssh/.
location = /reverse-ssh {
    return 301 /reverse-ssh/;
}

# After editing:  nginx -t && systemctl reload nginx
# Then browse:    http://182.70.254.11:1010/reverse-ssh/
